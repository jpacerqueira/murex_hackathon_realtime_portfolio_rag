# docker-compose.yml — full stack for the Murex trade-blotter hackathon.
#
# Services:
#   * trade-api               REST back-end (your existing image, port 8000)
#   * mcp-server              MCP HTTP bridge / mcp_http_server.py (port 7001)
#   * desktop-app             existing UI (port 5173)
#   * trade-blotter-hitl-agent  NEW — Google ADK agent with HITL approval
#                               on mutating MCP tools, served via `adk web`
#                               on host port 8200 -> container 8000.
#
# Bring up the whole stack:
#     export GOOGLE_API_KEY=...        # or GEMINI_API_KEY
#     docker compose up --build
#
# Or only the agent (assumes the rest is already running):
#     docker compose up --build trade-blotter-hitl-agent

services:
  trade-api:
    build:
      context: ./tradeQueryApi
    container_name: trade-api
    ports:
      - "8000:8000"
    networks:
      - mcp-hackathon

  mcp-server:
    build:
      context: ./mcp
    container_name: mcp-server
    environment:
      - TRADE_API_BASE_URL=http://trade-api:8000
      # - TRADE_API_BASE_URL=https://mxXXXXXXXXXvm.hackathon.MMMMMM.com:99999
      # TRADE_API_BASE_URL is the base URL for the trade API local is http://trade-api:8000
      # Murex credentials are used to authenticate with the Murex API
      - MX_USERNAME=XXXXXXXXX
      - MX_PASSWORD=XXXXXXXXX
      - MX_GROUP=XXXXXXXXX # Trading group
      - MX_FO_DESK=XXXXXXXXX # Front office desk
    ports:
      - "7001:7001"
    # Make `mcp-server` healthy when /health on the bridge responds, so the
    # agent's `depends_on: condition: service_healthy` actually means something.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:7001/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    depends_on:
      - trade-api
    networks:
      - mcp-hackathon

  desktop-app:
    build:
      context: ./desktopApp
    container_name: desktop-app
    environment:
      - MCP_HTTP_BASE_URL=http://mcp-server:7001
      - PORT=5173
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_INFERENCE_MODEL=${GEMINI_INFERENCE_MODEL:-gemini-3.1-pro-preview}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL:-models/gemini-embedding-001}
    ports:
      - "5173:5173"
    depends_on:
      - mcp-server
    networks:
      - mcp-hackathon

  trade-blotter-hitl-agent:
    build:
      context: ./trade-blotter-hitl-agent
      dockerfile: Dockerfile
    container_name: trade-blotter-hitl-agent
    environment:
      # --- MCP HTTP bridge --------------------------------------------------
      - MCP_BRIDGE_URL=http://mcp-server:7001
      - MCP_BRIDGE_TIMEOUT=30
      # - MCP_BRIDGE_TOKEN=

      # --- Gemini / ADK -----------------------------------------------------
      # Either GOOGLE_API_KEY (AI Studio) or GEMINI_API_KEY (compose-style)
      # is forwarded; pydantic-settings reads GOOGLE_API_KEY.
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ADK_MODEL=${ADK_MODEL:-gemini-2.5-flash}

      # --- HITL classification ---------------------------------------------
      - TOOL_CLASSIFICATION_PATH=/app/assets/tool_classification.yaml
      - HITL_FAIL_CLOSED=${HITL_FAIL_CLOSED:-true}

      # --- Entrypoint wait ---------------------------------------------------
      - MCP_BRIDGE_WAIT_SECONDS=120
      - MCP_LIST_TOOLS_ON_STARTUP=true
    ports:
      # `adk web` listens on 8000 inside the container; publish on 8200 since
      # trade-api already owns 8000 on the host.
      - "8200:8000"
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/list-apps >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s
    restart: unless-stopped
    networks:
      - mcp-hackathon

networks:
  mcp-hackathon:
    name: mcp-hackathon
